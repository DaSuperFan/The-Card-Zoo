// ── Mock sales generator ──────────────────────────────────────────────────────
function seededRand(seed, offset) {
  const x = Math.sin(seed + offset) * 10000;
  return x - Math.floor(x);
}
function generateMockSales(query) {
  const seed = query.split("").reduce((a, c) => a + c.charCodeAt(0), 0);
  const r = (min, max, off) => Math.floor(seededRand(seed, off) * (max - min) + min);
  const basePrice = r(500, 9000, 1);
  const grades = ["Raw","PSA 7","PSA 8","PSA 9","PSA 10"];
  const gradeMulti = [0.15, 0.35, 0.55, 0.78, 1.0];
  const sales = Array.from({ length: 30 }, (_, i) => {
    const daysAgo = r(1, 88, i*7+2);
    const date = new Date(); date.setDate(date.getDate() - daysAgo);
    const gi = r(0, 5, i*3+1);
    const price = Math.round(basePrice * gradeMulti[gi] * (0.85 + r(0,30,i*11)/100));
    return { date:date.toLocaleDateString("en-US",{month:"short",day:"numeric"}), dateTs:date.getTime(), price, grade:grades[gi], platform:seededRand(seed,i*5)>0.5?"eBay":"PWCC" };
  }).sort((a,b) => b.dateTs - a.dateTs);
  const trend = Array.from({ length: 12 }, (_, i) => {
    const wk = sales.filter(s => Math.floor((Date.now()-s.dateTs)/(7*86400000))===(11-i));
    return { week:`W${i+1}`, avg:wk.length?Math.round(wk.reduce((s,x)=>s+x.price,0)/wk.length):null };
  });
  const allPrices = sales.map(s=>s.price);
  const psa10 = sales.filter(s=>s.grade==="PSA 10").map(s=>s.price);
  const minP=Math.min(...allPrices),maxP=Math.max(...allPrices),bSize=Math.max(1,Math.ceil((maxP-minP)/6));
  const distribution = Array.from({length:6},(_,i)=>{ const lo=minP+i*bSize,hi=lo+bSize; return{range:`$${lo}-${hi}`,count:allPrices.filter(p=>p>=lo&&p<hi).length}; });
  return { sales, trend, distribution, stats:{ avg:Math.round(allPrices.reduce((a,b)=>a+b,0)/allPrices.length), high:Math.max(...allPrices), low:Math.min(...allPrices), count:sales.length, psa10Avg:psa10.length?Math.round(psa10.reduce((a,b)=>a+b,0)/psa10.length):0 } };
}

const Tip = ({ active, payload, label }) => {
  if (!active || !payload?.length) return null;
  return (
    <div style={{ background:"#0f1117", border:"1px solid #2a2d3a", borderRadius:8, padding:"10px 14px" }}>
      <p style={{ color:"#8b8fa8", fontSize:12, marginBottom:6 }}>{label}</p>
      {payload.map((p,i) => <p key={i} style={{ color:p.color||"#f97316", fontSize:13, margin:"2px 0" }}>{p.name}: <strong>{typeof p.value==="number"&&p.value>300?fmt(p.value):p.value}</strong></p>)}
    </div>
  );
};

function Spark({ data, color="#f97316" }) {
  const min=Math.min(...data), max=Math.max(...data), h=32, w=80;
  const pts = data.map((v,i)=>{
    const x=(i/(data.length-1))*w;
    const y=h-((v-min)/(max-min||1))*h;
    return `${x},${y}`;
  }).join(" ");
  const last = pts.split(" ").at(-1).split(",");
  return (
    <svg width={w} height={h} style={{ display:"block" }}>
      <polyline points={pts} fill="none" stroke={color} strokeWidth={1.5} strokeLinejoin="round"/>
      <circle cx={parseFloat(last[0])} cy={parseFloat(last[1])} r={3} fill={color}/>
    </svg>
  );
}

function HeatBar({ value }) {
  const color = value>=90?"#ef4444":value>=75?"#f97316":value>=60?"#eab308":"#22c55e";
  return (
    <div style={{ display:"flex", alignItems:"center", gap:8 }}>
      <div style={{ flex:1, height:4, background:"#1e2130", borderRadius:2, overflow:"hidden" }}>
        <div style={{ width:`${value}%`, height:"100%", background:color, borderRadius:2 }}/>
      </div>
      <span style={{ fontSize:11, color, width:28, textAlign:"right" }}>{value}</span>
    </div>
  );
}

const GRADE_LIST = ["Raw", "PSA 7", "PSA 8", "PSA 9", "PSA 10"];
const GRADE_COLORS_COMP = { "Raw":"#8b8fa8", "PSA 7":"#a855f7", "PSA 8":"#3b82f6", "PSA 9":"#22c55e", "PSA 10":"#f97316" };

// Mock grade data generator — replaced by live eBay data when connected
function generateGradeData(cardName) {
  const seed = cardName.split("").reduce((a,c) => a + c.charCodeAt(0), 0);
  const r = (min, max, off) => Math.floor(Math.abs(Math.sin(seed + off) * 10000) % (max - min) + min);
  const rawPrice = r(80, 2000, 1);
  const grades = {
    "Raw":    { avg: rawPrice,                    pop: null, sales: r(40,200,2),  trend: Array.from({length:8},(_,i)=>Math.round(rawPrice*(0.85+i*0.02)+r(0,20,i*7))) },
    "PSA 7":  { avg: Math.round(rawPrice*1.4),    pop: r(800,4000,3),  sales: r(20,120,4),  trend: Array.from({length:8},(_,i)=>Math.round(rawPrice*1.4*(0.85+i*0.025)+r(0,30,i*8))) },
    "PSA 8":  { avg: Math.round(rawPrice*2.2),    pop: r(400,2000,5),  sales: r(15,80,6),   trend: Array.from({length:8},(_,i)=>Math.round(rawPrice*2.2*(0.85+i*0.03)+r(0,40,i*9))) },
    "PSA 9":  { avg: Math.round(rawPrice*4.1),    pop: r(200,1200,7),  sales: r(10,60,8),   trend: Array.from({length:8},(_,i)=>Math.round(rawPrice*4.1*(0.85+i*0.04)+r(0,60,i*10))) },
    "PSA 10": { avg: Math.round(rawPrice*11.5),   pop: r(50,500,9),    sales: r(5,40,10),   trend: Array.from({length:8},(_,i)=>Math.round(rawPrice*11.5*(0.85+i*0.05)+r(0,100,i*11))) },
  };
  return grades;
}

const WEEK_LABELS = ["W-8","W-7","W-6","W-5","W-4","W-3","W-2","W-1"];

const POPULAR_CARDS = [
  "LeBron James 2003 Topps Chrome RC",
  "Patrick Mahomes 2017 Panini Prizm RC",
  "Mike Trout 2011 Topps Update RC",
  "Wembanyama 2023 Panini Prizm RC",
  "Shohei Ohtani 2018 Topps Chrome RC",
  "Luka Doncic 2018 Panini Prizm RC",
  "Josh Allen 2018 Panini Prizm RC",
  "Ronald Acuna Jr 2018 Topps Chrome RC",
  "Caitlin Clark 2024 Parkside WNBA RC",
  "Connor McDavid 2015 Upper Deck YG RC",
  "Jayden Daniels 2024 Panini Prizm RC",
  "Juan Soto 2018 Topps Chrome RC",
];

function PSACompsTab({ backendUrl }) {
  const [cardInput, setCardInput] = useState("");
  const [activeCard, setActiveCard] = useState("LeBron James 2003 Topps Chrome RC");
  const [gradeData, setGradeData] = useState(() => generateGradeData("LeBron James 2003 Topps Chrome RC"));
  const [loading, setLoading] = useState(false);
  const [showSug, setShowSug] = useState(false);
  const [selectedGrades, setSelectedGrades] = useState(["Raw","PSA 8","PSA 9","PSA 10"]);
  const [viewMode, setViewMode] = useState("table"); // "table" | "chart" | "trend"

  const suggestions = useMemo(() =>
    cardInput.length > 1 ? POPULAR_CARDS.filter(c => c.toLowerCase().includes(cardInput.toLowerCase())).slice(0,5) : [],
    [cardInput]
  );

  const loadCard = (name) => {
    setLoading(true);
    setActiveCard(name);
    setCardInput("");
    setShowSug(false);
    // Fetch from backend or fall back to mock
    const fetchGrades = async () => {
      const grades = {};
      for (const grade of GRADE_LIST) {
        try {
          const q = `${name} ${grade === "Raw" ? "" : grade}`.trim();
          const r = await fetch(`${backendUrl}/api/search?q=${encodeURIComponent(q)}`);
          const d = await r.json();
          if (d.stats && d.stats.avg > 0) {
            // Filter to last 30 days
            const thirtyDaysAgo = Date.now() - 30 * 86400000;
            const recentSales = (d.sales || []).filter(s => new Date(s.date).getTime() > thirtyDaysAgo);
            const recentPrices = recentSales.map(s => s.price).filter(p => p > 0);
            const avg30 = recentPrices.length ? Math.round(recentPrices.reduce((a,b)=>a+b,0)/recentPrices.length) : d.stats.avg;
            grades[grade] = { avg: avg30, pop: null, sales: recentPrices.length, trend: d.trend?.map(t => t.avg).filter(Boolean) || [] };
          } else {
            grades[grade] = generateGradeData(name)[grade];
          }
        } catch(e) {
          grades[grade] = generateGradeData(name)[grade];
        }
      }
      return grades;
    };
    fetchGrades().then(g => { setGradeData(g); setLoading(false); });
  };

  const rawAvg = gradeData["Raw"]?.avg || 1;

  // Bar chart data
  const barData = GRADE_LIST.map(g => ({
    grade: g,
    avg: gradeData[g]?.avg || 0,
    vsRaw: g === "Raw" ? 0 : Math.round(((gradeData[g]?.avg || 0) - rawAvg) / rawAvg * 100),
  }));

  // Trend chart data
  const trendData = WEEK_LABELS.map((w, i) => {
    const row = { week: w };
    selectedGrades.forEach(g => {
      const trend = gradeData[g]?.trend || [];
      row[g] = trend[i] || null;
    });
    return row;
  });

  // ROI calculation — grading cost ~$25 for PSA bulk
  const GRADING_COST = 25;
  const roiData = GRADE_LIST.filter(g => g !== "Raw").map(g => {
    const gradeAvg = gradeData[g]?.avg || 0;
    const profit = gradeAvg - rawAvg - GRADING_COST;
    const roi = rawAvg > 0 ? Math.round((profit / (rawAvg + GRADING_COST)) * 100) : 0;
    return { grade: g, gradeAvg, profit, roi, worthIt: profit > 0 };
  });

  const bestGrade = [...roiData].sort((a,b) => b.roi - a.roi)[0];

  return (
    <div>
      {/* Header */}
      <div style={{marginBottom:24}}>
        <h2 style={{fontFamily:"serif",fontWeight:900,fontSize:22,letterSpacing:2}}>PSA COMPS</h2>
        <p style={{fontSize:12,color:"#555",marginTop:4}}>Compare Raw vs graded values — last 30 days of sales</p>
      </div>

      {/* Card search */}
      <div style={{position:"relative",marginBottom:20}}>
        <input
          style={{width:"100%",background:"#0f1117",border:`1px solid ${cardInput?"#f97316":"#2a2d3a"}`,borderRadius:10,padding:"13px 52px 13px 18px",fontFamily:"inherit",fontSize:14,color:"#e2e4ef",outline:"none"}}
          placeholder="Search a card e.g. LeBron James 2003 Topps Chrome RC"
          value={cardInput}
          onChange={e=>{setCardInput(e.target.value);setShowSug(true);}}
          onKeyDown={e=>e.key==="Enter"&&cardInput&&loadCard(cardInput)}
          onFocus={()=>setShowSug(true)}
        />
        <button onClick={()=>cardInput&&loadCard(cardInput)}
          style={{position:"absolute",right:12,top:"50%",transform:"translateY(-50%)",background:"#f97316",border:"none",borderRadius:6,padding:"7px 12px",cursor:"pointer",fontSize:14}}>
          🔍
        </button>
        {showSug && suggestions.length > 0 && (
          <div style={{position:"absolute",top:"calc(100% + 6px)",left:0,right:0,background:"#0f1117",border:"1px solid #2a2d3a",borderRadius:10,zIndex:100,overflow:"hidden"}}>
            {suggestions.map(s=>(
              <div key={s} onClick={()=>loadCard(s)}
                style={{padding:"10px 18px",fontSize:13,color:"#8b8fa8",cursor:"pointer",display:"flex",justifyContent:"space-between"}}
                onMouseEnter={e=>e.currentTarget.style.background="#161925"}
                onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                {s}
              </div>
            ))}
          </div>
        )}
      </div>

      {/* Quick picks */}
      <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:24}}>
        {POPULAR_CARDS.slice(0,6).map(c=>(
          <button key={c} onClick={()=>loadCard(c)}
            style={{background:activeCard===c?"rgba(249,115,22,0.1)":"none",border:`1px solid ${activeCard===c?"#f97316":"#2a2d3a"}`,borderRadius:6,padding:"6px 12px",cursor:"pointer",fontFamily:"inherit",fontSize:11,color:activeCard===c?"#f97316":"#8b8fa8"}}>
            {c.split(" ").slice(0,2).join(" ")}
          </button>
        ))}
      </div>

      {loading && (
        <div style={{display:"flex",alignItems:"center",gap:12,padding:"40px 0",color:"#555",fontSize:13}}>
          <div style={{width:18,height:18,border:"2px solid #2a2d3a",borderTopColor:"#f97316",borderRadius:"50%",animation:"spin 0.7s linear infinite"}}/>
          Loading 30-day comp data for {activeCard}...
        </div>
      )}

      {!loading && gradeData && (
        <div>
          {/* Active card title + best grade callout */}
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16,flexWrap:"wrap",gap:12}}>
            <p style={{fontSize:14,color:"#e2e4ef",fontFamily:"serif",fontWeight:900}}>{activeCard.toUpperCase()}</p>
            {bestGrade && bestGrade.worthIt && (
              <div style={{background:"#1a2a1a",border:"1px solid #22c55e30",borderRadius:8,padding:"8px 16px",display:"flex",gap:16,alignItems:"center"}}>
                <div>
                  <p style={{fontSize:10,color:"#555",letterSpacing:1}}>BEST GRADE TO SUBMIT</p>
                  <p style={{fontSize:16,fontFamily:"serif",fontWeight:900,color:"#22c55e"}}>{bestGrade.grade}</p>
                </div>
                <div>
                  <p style={{fontSize:10,color:"#555",letterSpacing:1}}>EST. PROFIT</p>
                  <p style={{fontSize:16,fontFamily:"serif",fontWeight:900,color:"#f97316"}}>${bestGrade.profit.toLocaleString()}</p>
                </div>
                <div>
                  <p style={{fontSize:10,color:"#555",letterSpacing:1}}>ROI</p>
                  <p style={{fontSize:16,fontFamily:"serif",fontWeight:900,color:"#22c55e"}}>+{bestGrade.roi}%</p>
                </div>
              </div>
            )}
          </div>

          {/* View toggle */}
          <div style={{display:"flex",background:"#0f1117",border:"1px solid #1e2130",borderRadius:8,overflow:"hidden",marginBottom:20,width:"fit-content"}}>
            {[["table","📋 Table"],["chart","📊 Bar Chart"],["trend","📈 Trend"]].map(([v,l])=>(
              <button key={v} onClick={()=>setViewMode(v)}
                style={{padding:"8px 18px",background:viewMode===v?"#f97316":"transparent",border:"none",cursor:"pointer",fontFamily:"inherit",fontSize:12,color:viewMode===v?"#fff":"#555"}}>
                {l}
              </button>
            ))}
          </div>

          {/* TABLE VIEW */}
          {viewMode==="table" && (
            <div style={{background:"#0f1117",border:"1px solid #1e2130",borderRadius:12,overflow:"hidden",marginBottom:20}}>
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
                <thead>
                  <tr style={{borderBottom:"1px solid #1e2130"}}>
                    {["GRADE","AVG SALE (30D)","SALES","VS RAW","GRADING ROI"].map(h=>(
                      <th key={h} style={{padding:"12px 16px",color:"#555",fontSize:11,textAlign:"left",fontWeight:400,letterSpacing:1}}>{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {GRADE_LIST.map((grade,i)=>{
                    const d = gradeData[grade] || {};
                    const vsRaw = grade==="Raw" ? "—" : `+${Math.round(((d.avg||0)-rawAvg)/rawAvg*100)}%`;
                    const roi = roiData.find(r=>r.grade===grade);
                    return (
                      <tr key={grade} style={{borderBottom:"1px solid #1a1d28",background:i%2!==0?"#0b0d14":"transparent"}}>
                        <td style={{padding:"13px 16px"}}>
                          <span style={{color:GRADE_COLORS_COMP[grade],fontFamily:"serif",fontWeight:900,fontSize:13}}>{grade}</span>
                        </td>
                        <td style={{padding:"13px 16px",color:"#f97316",fontFamily:"serif",fontWeight:900,fontSize:14}}>
                          {d.avg ? `$${d.avg.toLocaleString()}` : "—"}
                        </td>
                        <td style={{padding:"13px 16px",color:"#8b8fa8"}}>{d.sales || "—"}</td>
                        <td style={{padding:"13px 16px"}}>
                          {grade==="Raw" ? <span style={{color:"#555"}}>Baseline</span> :
                            <span style={{color:"#22c55e",fontWeight:500}}>{vsRaw}</span>}
                        </td>
                        <td style={{padding:"13px 16px"}}>
                          {roi ? (
                            <span style={{color:roi.worthIt?"#22c55e":"#ef4444",fontWeight:500}}>
                              {roi.worthIt ? `+$${roi.profit.toLocaleString()} (${roi.roi}%)` : `-$${Math.abs(roi.profit).toLocaleString()}`}
                            </span>
                          ) : "—"}
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
              <div style={{padding:"10px 16px",borderTop:"1px solid #1e2130"}}>
                <p style={{fontSize:10,color:"#333"}}>* Grading ROI assumes $25 PSA bulk submission cost · Based on last 30 days of eBay sold data</p>
              </div>
            </div>
          )}

          {/* BAR CHART VIEW */}
          {viewMode==="chart" && (
            <div>
              <div style={{background:"#0f1117",border:"1px solid #1e2130",borderRadius:12,padding:"20px 10px 10px",marginBottom:16}}>
                <p style={{fontSize:11,color:"#555",letterSpacing:2,paddingLeft:10,marginBottom:12}}>AVG SALE PRICE BY GRADE — LAST 30 DAYS</p>
                <ResponsiveContainer width="100%" height={260}>
                  <BarChart data={barData}>
                    <CartesianGrid strokeDasharray="3 3" stroke="#1e2130"/>
                    <XAxis dataKey="grade" tick={{fill:"#8b8fa8",fontSize:11}} axisLine={false} tickLine={false}/>
                    <YAxis tickFormatter={v=>v>=1000?`$${(v/1000).toFixed(1)}k`:`$${v}`} tick={{fill:"#555",fontSize:10}} axisLine={false} tickLine={false} width={55}/>
                    <Tooltip content={({active,payload,label})=>{
                      if(!active||!payload?.length) return null;
                      const d = gradeData[label] || {};
                      const vsRaw = label==="Raw"?"Baseline":`+${Math.round(((d.avg||0)-rawAvg)/rawAvg*100)}% vs Raw`;
                      return (
                        <div style={{background:"#0f1117",border:"1px solid #2a2d3a",borderRadius:8,padding:"10px 14px"}}>
                          <p style={{color:GRADE_COLORS_COMP[label],fontFamily:"serif",fontWeight:900,fontSize:14,marginBottom:4}}>{label}</p>
                          <p style={{color:"#f97316",fontSize:13}}>Avg: <strong>${(d.avg||0).toLocaleString()}</strong></p>
                          <p style={{color:"#22c55e",fontSize:12}}>{vsRaw}</p>
                          <p style={{color:"#555",fontSize:11}}>{d.sales||0} sales in 30 days</p>
                        </div>
                      );
                    }}/>
                    <Bar dataKey="avg" name="Avg Sale" radius={[6,6,0,0]}>
                      {barData.map((entry,i)=>(
                        <rect key={i} fill={GRADE_COLORS_COMP[entry.grade]}/>
                      ))}
                    </Bar>
                    <Bar dataKey="avg" name="Avg Sale" radius={[6,6,0,0]} fill="#f97316"/>
                  </BarChart>
                </ResponsiveContainer>
              </div>
              <div style={{background:"#0f1117",border:"1px solid #1e2130",borderRadius:12,padding:"20px 10px 10px"}}>
                <p style={{fontSize:11,color:"#555",letterSpacing:2,paddingLeft:10,marginBottom:12}}>% PREMIUM OVER RAW</p>
                <ResponsiveContainer width="100%" height={180}>
                  <BarChart data={barData.filter(d=>d.grade!=="Raw")}>
                    <CartesianGrid strokeDasharray="3 3" stroke="#1e2130"/>
                    <XAxis dataKey="grade" tick={{fill:"#8b8fa8",fontSize:11}} axisLine={false} tickLine={false}/>
                    <YAxis tick={{fill:"#555",fontSize:10}} axisLine={false} tickLine={false} tickFormatter={v=>`+${v}%`} width={55}/>
                    <Tooltip content={<Tip/>}/>
                    <Bar dataKey="vsRaw" name="Premium over Raw" fill="#22c55e" radius={[6,6,0,0]}/>
                  </BarChart>
                </ResponsiveContainer>
              </div>
            </div>
          )}

          {/* TREND VIEW */}
          {viewMode==="trend" && (
            <div>
              <div style={{display:"flex",gap:8,marginBottom:16,flexWrap:"wrap",alignItems:"center"}}>
                <span style={{fontSize:11,color:"#555"}}>SHOW GRADES:</span>
                {GRADE_LIST.map(g=>(
                  <button key={g} onClick={()=>setSelectedGrades(prev=>prev.includes(g)?prev.filter(x=>x!==g):[...prev,g])}
                    style={{padding:"4px 12px",borderRadius:20,border:`1px solid ${selectedGrades.includes(g)?GRADE_COLORS_COMP[g]:"#2a2d3a"}`,background:selectedGrades.includes(g)?`${GRADE_COLORS_COMP[g]}18`:"none",color:selectedGrades.includes(g)?GRADE_COLORS_COMP[g]:"#555",fontSize:11,cursor:"pointer",fontFamily:"inherit"}}>
                    {g}
                  </button>
                ))}
              </div>
              <div style={{background:"#0f1117",border:"1px solid #1e2130",borderRadius:12,padding:"20px 10px 10px"}}>
                <p style={{fontSize:11,color:"#555",letterSpacing:2,paddingLeft:10,marginBottom:12}}>8-WEEK PRICE TREND BY GRADE</p>
                <ResponsiveContainer width="100%" height={300}>
                  <LineChart data={trendData}>
                    <CartesianGrid strokeDasharray="3 3" stroke="#1e2130"/>
                    <XAxis dataKey="week" tick={{fill:"#555",fontSize:10}} axisLine={false} tickLine={false}/>
                    <YAxis tickFormatter={v=>v>=1000?`$${(v/1000).toFixed(1)}k`:`$${v}`} tick={{fill:"#555",fontSize:10}} axisLine={false} tickLine={false} width={55}/>
                    <Tooltip content={<Tip/>}/>
                    <Legend wrapperStyle={{fontSize:11,color:"#8b8fa8",paddingTop:10}}/>
                    {selectedGrades.map(g=>(
                      <Line key={g} type="monotone" dataKey={g} stroke={GRADE_COLORS_COMP[g]} strokeWidth={2} dot={{r:3,fill:GRADE_COLORS_COMP[g]}} activeDot={{r:5}} connectNulls/>
                    ))}
                  </LineChart>
                </ResponsiveContainer>
              </div>

              {/* Grade summary cards */}
              <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(160px,1fr))",gap:10,marginTop:16}}>
                {selectedGrades.map(g=>{
                  const d = gradeData[g]||{};
                  const trend = d.trend||[];
                  const first = trend[0]||0, last = trend[trend.length-1]||0;
                  const ch = first>0?((last-first)/first*100).toFixed(1):0;
                  return (
                    <div key={g} style={{background:"#0f1117",border:`1px solid ${GRADE_COLORS_COMP[g]}30`,borderRadius:10,padding:"14px 16px"}}>
                      <p style={{fontSize:11,color:GRADE_COLORS_COMP[g],letterSpacing:1}}>{g}</p>
                      <p style={{fontSize:20,fontFamily:"serif",fontWeight:900,marginTop:4}}>{d.avg?`$${d.avg.toLocaleString()}`:"—"}</p>
                      <p style={{fontSize:11,marginTop:4,color:ch>=0?"#22c55e":"#ef4444"}}>{ch>=0?"▲":"▼"} {Math.abs(ch)}% 8-week</p>
                    </div>
                  );
                })}
              </div>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

function TrendsPopTab({ sportFilter }) {
  const [selectedCards, setSelectedCards] = useState(["LeBron James","Patrick Mahomes"]);
  const filteredCards = useMemo(() => SAMPLE_CARDS.filter(c=>sportFilter==="All"||c.sport===sportFilter), [sportFilter]);
  const toggleCard = p => setSelectedCards(prev=>prev.includes(p)?prev.filter(x=>x!==p):prev.length<4?[...prev,p]:prev);
  const trendData = useMemo(() =>
    MONTHS.map((m,i)=>{ const row={month:m}; selectedCards.forEach(p=>{row[p]=PRICE_HISTORY[p]?.[i]?.price??null;}); return row; }),
    [selectedCards]
  );
  const popData = useMemo(() => filteredCards.map(c=>({name:c.player,pop:c.pop,avgSale:c.avgSale,sport:c.sport})), [filteredCards]);

  return (
    <div>
      {/* Price Trends section */}
      <div style={{ marginBottom:32 }}>
        <h2 style={{ fontFamily:"serif", fontWeight:900, fontSize:20, letterSpacing:2, marginBottom:4 }}>PRICE TRENDS — 12 MONTHS</h2>
        <p style={{ fontSize:12, color:"#555", marginBottom:16 }}>Select up to 4 cards to compare</p>
        <div style={{ display:"flex", flexWrap:"wrap", gap:8, marginBottom:16 }}>
          {Object.keys(PRICE_HISTORY).map(p=>(
            <button key={p} onClick={()=>toggleCard(p)}
              style={{ background:selectedCards.includes(p)?"rgba(249,115,22,0.08)":"none", cursor:"pointer", border:`1px solid ${selectedCards.includes(p)?"#f97316":"#2a2d3a"}`, borderRadius:6, padding:"7px 12px", fontFamily:"inherit", fontSize:12, color:selectedCards.includes(p)?"#f97316":"#8b8fa8" }}>
              {p}
            </button>
          ))}
        </div>
        <div style={S.chartBox}>
          <ResponsiveContainer width="100%" height={280}>
            <LineChart data={trendData}>
              <CartesianGrid strokeDasharray="3 3" stroke="#1e2130"/>
              <XAxis dataKey="month" tick={{fill:"#555",fontSize:11}} axisLine={false} tickLine={false}/>
              <YAxis tickFormatter={fmt} tick={{fill:"#555",fontSize:11}} axisLine={false} tickLine={false} width={55}/>
              <Tooltip content={<Tip/>}/><Legend wrapperStyle={{fontSize:12,color:"#8b8fa8",paddingTop:10}}/>
              {selectedCards.map((p,i)=><Line key={p} type="monotone" dataKey={p} stroke={CHART_COLORS[i]} strokeWidth={2} dot={false} activeDot={{r:5}}/>)}
            </LineChart>
          </ResponsiveContainer>
        </div>
        <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(180px,1fr))", gap:10, marginTop:14 }}>
          {selectedCards.map((p,i)=>{ const h=PRICE_HISTORY[p]; if(!h) return null; const first=h[0].price,last=h[h.length-1].price,ch=((last-first)/first*100).toFixed(1); return(
            <div key={p} style={{ ...S.statBox, borderColor:`${CHART_COLORS[i]}40` }}>
              <p style={{ fontSize:11, color:CHART_COLORS[i], letterSpacing:1 }}>{p.toUpperCase()}</p>
              <p style={{ fontSize:20, fontFamily:"serif", fontWeight:900, marginTop:4 }}>{fmt(last)}</p>
              <p style={{ fontSize:12, marginTop:2, color:ch>=0?"#22c55e":"#ef4444" }}>{ch>=0?"▲":"▼"} {Math.abs(ch)}% YTD</p>
            </div>
          );})}
        </div>
      </div>

      {/* Divider */}
      <div style={{ borderTop:"1px solid #1e2130", marginBottom:32 }}/>

      {/* Population & Grade section */}
      <div>
        <h2 style={{ fontFamily:"serif", fontWeight:900, fontSize:20, letterSpacing:2, marginBottom:4 }}>POPULATION & GRADE DATA</h2>
        <p style={{ fontSize:12, color:"#555", marginBottom:16 }}>PSA 10 population vs average sale price</p>
        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:16, marginBottom:16 }}>
          {[["PSA 10 POPULATION","pop","#3b82f6",false],["AVG SALE PRICE (PSA 10)","avgSale","#f97316",true]].map(([title,key,color,isFmt])=>(
            <div key={title} style={S.chartBox}>
              <p style={{ fontSize:11, color:"#555", letterSpacing:2, paddingLeft:10, marginBottom:12 }}>{title}</p>

                <BarChart data={popData} layout="vertical">
                  <CartesianGrid strokeDasharray="3 3" stroke="#1e2130" horizontal={false}/>
                  <XAxis type="number" tickFormatter={isFmt?fmt:undefined} tick={{fill:"#555",fontSize:10}} axisLine={false} tickLine={false}/>
                  <YAxis type="category" dataKey="name" tick={{fill:"#8b8fa8",fontSize:10}} width={130} axisLine={false} tickLine={false}/>
                  <Tooltip content={<Tip/>}/>
                  <Bar dataKey={key} name={title} fill={color} radius={[0,4,4,0]}/>

                <td style={{ padding:"10px 16px", color:"#f97316", fontWeight:500 }}>{fmt(c.avgSale)}</td>
              </tr>
            ))}</tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

// ── Search Tab ────────────────────────────────────────────────────────────────
// ── Request Player Modal ──────────────────────────────────────────────────────
function RequestPlayerModal({ onClose, backendUrl }) {
  const [playerName, setPlayerName] = useState("");
  const [sport, setSport] = useState("Basketball");
  const [status, setStatus] = useState(null); // null | "loading" | "success" | "error"
  const [message, setMessage] = useState("");

  const submit = () => {
    if (!playerName.trim()) return;
    setStatus("loading");
    fetch(`${backendUrl}/api/request`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ player: playerName.trim(), sport }),
    })
      .then(r => r.json())
      .then(data => {
        setStatus(data.status === "approved" || data.status === "already_tracked" || data.status === "upvoted" || data.status === "requested" ? "success" : "error");
        setMessage(data.message || "Player requested!");
      })
      .catch(() => { setStatus("error"); setMessage("Could not connect to server. Try again later."); });
  };

  const SPORTS = ["Basketball", "Football", "Baseball", "Hockey"];
  const SPORT_COLORS = { Basketball: "#f97316", Football: "#22c55e", Baseball: "#3b82f6", Hockey: "#a855f7" };

  return (
    <div style={{ position:"fixed", top:0, left:0, right:0, bottom:0, background:"rgba(0,0,0,0.7)", display:"flex", alignItems:"center", justifyContent:"center", zIndex:1000 }}
      onClick={e => e.target === e.currentTarget && onClose()}>
      <div style={{ background:"#0f1117", border:"1px solid #2a2d3a", borderRadius:16, padding:32, width:"100%", maxWidth:440, margin:"0 16px" }}>

        {/* Header */}
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:24 }}>
          <div>
            <p style={{ fontFamily:"serif", fontWeight:900, fontSize:20, letterSpacing:2 }}>REQUEST A PLAYER</p>
            <p style={{ fontSize:12, color:"#555", marginTop:4 }}>Can't find someone? Add them to tracking</p>
          </div>
          <button onClick={onClose} style={{ background:"none", border:"none", color:"#555", cursor:"pointer", fontSize:20 }}>✕</button>
        </div>

        {status === "success" ? (
          <div style={{ textAlign:"center", padding:"20px 0" }}>
            <p style={{ fontSize:32 }}>✅</p>
            <p style={{ fontSize:14, color:"#22c55e", marginTop:12, fontFamily:"serif", fontWeight:900 }}>REQUEST RECEIVED</p>
            <p style={{ fontSize:12, color:"#8b8fa8", marginTop:8 }}>{message}</p>
            <button onClick={onClose}
              style={{ marginTop:20, background:"#f97316", border:"none", borderRadius:8, padding:"10px 24px", color:"#fff", cursor:"pointer", fontFamily:"inherit", fontSize:13 }}>
              Done
            </button>
          </div>
        ) : (
          <>
            {/* Player name input */}
            <div style={{ marginBottom:16 }}>
              <p style={{ fontSize:11, color:"#555", letterSpacing:1, marginBottom:8 }}>PLAYER NAME</p>
              <input
                style={{ width:"100%", background:"#080a0f", border:`1px solid ${playerName ? "#f97316" : "#2a2d3a"}`, borderRadius:8, padding:"12px 16px", fontFamily:"inherit", fontSize:14, color:"#e2e4ef", outline:"none" }}
                placeholder="e.g. Bo Jackson, Barry Sanders..."
                value={playerName}
                onChange={e => setPlayerName(e.target.value)}
                onKeyDown={e => e.key === "Enter" && submit()}
                autoFocus
              />
            </div>

            {/* Sport selector */}
            <div style={{ marginBottom:24 }}>
              <p style={{ fontSize:11, color:"#555", letterSpacing:1, marginBottom:8 }}>SPORT</p>
              <div style={{ display:"flex", gap:8, flexWrap:"wrap" }}>
                {SPORTS.map(s => (
                  <button key={s} onClick={() => setSport(s)}
                    style={{ padding:"6px 16px", borderRadius:20, border:`1px solid ${sport===s?(SPORT_COLORS[s]||"#f97316"):"#2a2d3a"}`, background:sport===s?`${SPORT_COLORS[s]||"#f97316"}18`:"none", color:sport===s?(SPORT_COLORS[s]||"#f97316"):"#555", cursor:"pointer", fontFamily:"inherit", fontSize:12 }}>
                    {s}
                  </button>
                ))}
              </div>
            </div>

            {/* Error message */}
            {status === "error" && (
              <p style={{ fontSize:12, color:"#ef4444", marginBottom:16 }}>{message}</p>
            )}

            {/* Submit */}
            <button onClick={submit} disabled={!playerName.trim() || status === "loading"}
              style={{ width:"100%", background: playerName.trim() ? "#f97316" : "#1e2130", border:"none", borderRadius:8, padding:"12px", color: playerName.trim() ? "#fff" : "#444", cursor: playerName.trim() ? "pointer" : "default", fontFamily:"inherit", fontSize:14, fontWeight:500, letterSpacing:1 }}>
              {status === "loading" ? "Submitting..." : "REQUEST PLAYER"}
            </button>

            <p style={{ fontSize:11, color:"#333", marginTop:12, textAlign:"center" }}>
              Players are added automatically and tracked from the next daily refresh
            </p>
          </>
        )}
      </div>
    </div>
  );
}

function SearchTab() {
  const [query, setQuery] = useState("");
  const [results, setResults] = useState(null);
  const [loading, setLoading] = useState(false);
  const [showSug, setShowSug] = useState(false);
  const [searched, setSearched] = useState("");
  const SUGGESTIONS = ["LeBron James 2003 Topps Chrome RC PSA 10","Patrick Mahomes 2017 Panini Prizm RC PSA 10","Wembanyama 2023 Panini Prizm RC PSA 10","Caitlin Clark 2024 Parkside WNBA RC PSA 10","Jayden Daniels 2024 Panini Prizm RC PSA 10","Shohei Ohtani 2018 Topps Chrome RC PSA 10","Connor McDavid 2015 Upper Deck YG RC PSA 10"];
  const suggestions = useMemo(()=>query.length>1?SUGGESTIONS.filter(c=>c.toLowerCase().includes(query.toLowerCase())).slice(0,5):[], [query]);
  const runSearch = q => {
    const term=(q||query).trim(); if(!term) return;
    setShowSug(false); setLoading(true); setResults(null); setSearched(term);
    fetch(`${BACKEND_URL}/api/search?q=${encodeURIComponent(term)}`)
      .then(r => r.json())
      .then(data => {
        if (data.error || !data.stats) {
          setResults(generateMockSales(term));
        } else {
          const psa10 = data.sales.filter(s => s.title && s.title.toUpperCase().includes('PSA 10')).map(s => s.price);
          const formattedSales = data.sales.map(s => ({
            ...s,
            date: s.date ? new Date(s.date).toLocaleDateString('en-US',{month:'short',day:'numeric'}) : 'N/A',
            grade: s.title?.match(/PSA \d+/i)?.[0] || 'Raw',
            platform: 'eBay'
          }));
          setResults({
            ...data,
            stats: { ...data.stats, psa10Avg: psa10.length ? Math.round(psa10.reduce((a,b)=>a+b,0)/psa10.length) : 0, count: data.sales.length },
            sales: formattedSales
          });
        }
        setLoading(false);
      })
      .catch(() => { setResults(generateMockSales(term)); setLoading(false); });
  };
  return (
    <div>
      <div style={{ marginBottom:24 }}>
        <h2 style={{ fontFamily:"serif", fontSize:22, letterSpacing:2, fontWeight:900 }}>CARD SEARCH</h2>
        <p style={{ fontSize:12, color:"#555", marginTop:4 }}>Search any card — see recent sales, trend & price distribution</p>
      </div>
      <div style={{ position:"relative", marginBottom:8 }}>
        <input style={{ width:"100%", background:"#0f1117", border:`1px solid ${query?"#f97316":"#2a2d3a"}`, borderRadius:10, padding:"14px 52px 14px 18px", fontFamily:"inherit", fontSize:14, color:"#e2e4ef", outline:"none" }}
          placeholder="e.g. LeBron James 2003 Topps Chrome PSA 10" value={query}
          onChange={e=>{setQuery(e.target.value);setShowSug(true);}} onKeyDown={e=>e.key==="Enter"&&runSearch()} onFocus={()=>setShowSug(true)}/>
        <button onClick={()=>runSearch()} style={{ position:"absolute", right:12, top:"50%", transform:"translateY(-50%)", background:"#f97316", border:"none", borderRadius:6, padding:"7px 12px", cursor:"pointer", fontSize:14 }}>🔍</button>
        {showSug&&suggestions.length>0&&(
          <div style={{ position:"absolute", top:"calc(100% + 6px)", left:0, right:0, background:"#0f1117", border:"1px solid #2a2d3a", borderRadius:10, zIndex:100, overflow:"hidden" }}>
            {suggestions.map(s=>(
              <div key={s} onClick={()=>{setQuery(s);setShowSug(false);runSearch(s);}}
                style={{ padding:"10px 18px", fontSize:13, color:"#8b8fa8", cursor:"pointer", display:"flex", justifyContent:"space-between", alignItems:"center" }}
                onMouseEnter={e=>e.currentTarget.style.background="#161925"} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                <span>{s}</span><span style={{ fontSize:10, padding:"2px 8px", borderRadius:4, background:"#1a2a1a", color:"#22c55e", border:"1px solid #22c55e30" }}>MOCK</span>
              </div>
            ))}
          </div>
        )}
      </div>
      <p style={{ fontSize:11, color:"#333", marginBottom:28 }}>🔴 Live eBay data — results reflect real recent sales</p>
      {loading&&<div style={{ display:"flex", alignItems:"center", gap:12, padding:"40px 0", color:"#555", fontSize:13 }}><div style={{ width:18, height:18, border:"2px solid #2a2d3a", borderTopColor:"#f97316", borderRadius:"50%", animation:"spin 0.7s linear infinite" }}/>Fetching listings for "{searched}"...</div>}
      {results&&!loading&&(
        <div>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:20, flexWrap:"wrap", gap:8 }}>
            <p style={{ fontSize:13, color:"#8b8fa8" }}>Results for <span style={{ color:"#f97316" }}>{searched}</span> <span style={{ color:"#333" }}>· {results.stats.count} sales · last 90 days</span></p>
            <span style={{ fontSize:10, padding:"2px 8px", borderRadius:4, background:"#1a2a1a", color:"#22c55e", border:"1px solid #22c55e30" }}>LIVE EBAY DATA</span>
          </div>
          <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(140px,1fr))", gap:10, marginBottom:24 }}>
            {[{l:"AVG PRICE",v:fmt(results.stats.avg),c:"#f97316"},{l:"HIGH SALE",v:fmt(results.stats.high),c:"#22c55e"},{l:"LOW SALE",v:fmt(results.stats.low),c:"#ef4444"},{l:"PSA 10 AVG",v:fmt(results.stats.psa10Avg),c:"#a855f7"},{l:"TOTAL SALES",v:results.stats.count,c:"#3b82f6"}].map(({l,v,c})=>(
              <div key={l} style={{ ...S.statBox, borderColor:`${c}30` }}>
                <p style={{ fontSize:10, color:"#555", letterSpacing:1 }}>{l}</p>
                <p style={{ fontSize:20, fontFamily:"serif", fontWeight:900, color:c, marginTop:4 }}>{v}</p>
              </div>
            ))}
          </div>
          <div style={{ ...S.chartBox, marginBottom:16 }}>
            <p style={{ fontSize:11, color:"#555", letterSpacing:2, paddingLeft:10, marginBottom:12 }}>PRICE TREND — 12 WEEKS</p>
            <ResponsiveContainer width="100%" height={200}>
              <AreaChart data={results.trend}>
                <defs><linearGradient id="sg" x1="0" y1="0" x2="0" y2="1"><stop offset="5%" stopColor="#f97316" stopOpacity={0.3}/><stop offset="95%" stopColor="#f97316" stopOpacity={0}/></linearGradient></defs>
                <CartesianGrid strokeDasharray="3 3" stroke="#1e2130"/>
                <XAxis dataKey="week" tick={{fill:"#555",fontSize:10}} axisLine={false} tickLine={false}/>
                <YAxis tickFormatter={fmt} tick={{fill:"#555",fontSize:10}} axisLine={false} tickLine={false} width={55}/>
                <Tooltip content={<Tip/>}/>
                <Area type="monotone" dataKey="avg" name="Avg Price" stroke="#f97316" strokeWidth={2} fill="url(#sg)" dot={{fill:"#f97316",r:3}} connectNulls/>
              </AreaChart>
            </ResponsiveContainer>
          </div>
          <div style={{ ...S.chartBox, marginBottom:16 }}>
            <p style={{ fontSize:11, color:"#555", letterSpacing:2, paddingLeft:10, marginBottom:12 }}>PRICE DISTRIBUTION</p>
            <ResponsiveContainer width="100%" height={160}>
              <BarChart data={results.distribution}>
                <CartesianGrid strokeDasharray="3 3" stroke="#1e2130"/>
                <XAxis dataKey="range" tick={{fill:"#555",fontSize:9}} axisLine={false} tickLine={false}/>
                <YAxis tick={{fill:"#555",fontSize:10}} axisLine={false} tickLine={false} width={28}/>
                <Tooltip content={<Tip/>}/>
                <Bar dataKey="count" name="Sales" fill="#3b82f6" radius={[4,4,0,0]}/>
              </BarChart>
            </ResponsiveContainer>
          </div>
          <div style={{ background:"#0f1117", border:"1px solid #1e2130", borderRadius:12, overflow:"hidden" }}>
            <div style={{ padding:"12px 16px", borderBottom:"1px solid #1e2130", display:"flex", justifyContent:"space-between" }}>
              <p style={{ fontSize:11, color:"#555", letterSpacing:2 }}>RECENT SALES</p>
              <p style={{ fontSize:11, color:"#333" }}>{results.sales.length} listings</p>
            </div>
            <div style={{ display:"grid", gridTemplateColumns:"1fr auto auto auto", gap:12, padding:"8px 16px", borderBottom:"1px solid #1e2130" }}>
              {["DATE","GRADE","PLATFORM","PRICE"].map(h=><p key={h} style={{ fontSize:10, color:"#444", letterSpacing:1 }}>{h}</p>)}
            </div>
            <div style={{ maxHeight:280, overflowY:"auto" }}>
              {results.sales.map((s,i)=>(
                <div key={i} style={{ display:"grid", gridTemplateColumns:"1fr auto auto auto", gap:12, padding:"10px 16px", borderBottom:"1px solid #1a1d28", fontSize:12, alignItems:"center" }}
                  onMouseEnter={e=>e.currentTarget.style.background="#0d1018"} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                  <span style={{ color:"#8b8fa8" }}>{s.date}</span>
                  <span style={{ color:GRADE_COLORS[s.grade]||"#555", fontSize:11 }}>{s.grade}</span>
                  <span style={{ color:"#555", fontSize:11 }}>{s.platform}</span>
                  <span style={{ color:"#f97316", fontWeight:500 }}>{fmt(s.price)}</span>
                </div>
              ))}
            </div>
          </div>
        </div>
      )}
      {!results&&!loading&&(
        <div style={{ padding:"60px 0", textAlign:"center", color:"#2a2d3a" }}>
          <p style={{ fontFamily:"serif", fontSize:32, fontWeight:900, letterSpacing:4 }}>SEARCH A CARD</p>
          <p style={{ fontSize:12, marginTop:8, color:"#333" }}>Try "LeBron James PSA 10" or "Wembanyama RC"</p>
        </div>
      )}
    </div>
  );
}

// ── Live data hook — fetches from backend, falls back to mock ─────────────────
const BACKEND_URL = "https://the-card-zoo-production.up.railway.app"; // ← change to your Railway/Render URL when deployed

function useLiveData() {
  const [liveData, setLiveData] = useState(null);
  const [liveStatus, setLiveStatus] = useState("loading");

  useState(() => {
    fetch(`${BACKEND_URL}/api/prices`)
      .then(r => r.json())
      .then(data => {
        if (data?.players?.length) { setLiveData(data); setLiveStatus("live"); }
        else setLiveStatus("mock");
      })
      .catch(() => setLiveStatus("mock"));
  }, []);

  const hotPlayers = useMemo(() => {
    if (!liveData) return HOT_PLAYERS;
    return liveData.players.map((p, i) => ({
      rank: i + 1, player: p.player, sport: p.sport,
      reason: p.reason || `${p.cards?.length || 0} cards tracked`,
      weekChange: p.weekChange || 0, monthChange: p.monthChange || 0,
      volume: p.volume || 0, heat: p.heat || 50, liveCards: p.cards || [],
    }));
  }, [liveData]);

  return { hotPlayers, liveStatus, lastUpdated: liveData?.lastUpdated };
}

// ── Main App ──────────────────────────────────────────────────────────────────
function TheCardZoo() {
  const [activeTab, setActiveTab] = useState("hot");
  const [sportFilter, setSportFilter] = useState("All");
  const [selectedPlayer, setSelectedPlayer] = useState(null);
  const [uploadMsg, setUploadMsg] = useState(null);
  const { hotPlayers, liveStatus, lastUpdated } = useLiveData();

  const handlePlayerClick = player => { setSelectedPlayer(player); window.scrollTo(0,0); };
  const handleBack = () => setSelectedPlayer(null);

  const tabBtn = (id, label) => (
    <button key={id} onClick={()=>setActiveTab(id)}
      style={{ background:"none", border:"none", borderBottom:activeTab===id?"2px solid #f97316":"2px solid transparent", cursor:"pointer", padding:"10px 20px", fontFamily:"inherit", fontSize:13, letterSpacing:"0.08em", color:activeTab===id?"#f97316":"#555", whiteSpace:"nowrap" }}>
      {label}
    </button>

  return (
    <div style={S.body}>
      <style>{`@keyframes spin{to{transform:rotate(360deg);}} *{box-sizing:border-box;margin:0;padding:0;}`}</style>

      {/* Header */}

            <button onClick={handleBack} style={{ background:"none", border:"1px solid #2a2d3a", borderRadius:6, padding:"4px 10px", color:"#555", cursor:"pointer", fontFamily:"inherit", fontSize:12 }}>←</button>
          )}
          <span style={S.logo}>{selectedPlayer ? `THE CARD ZOO / ${selectedPlayer.player.split(" ").at(-1).toUpperCase()}` : "THE CARD ZOO"}</span>
          {!selectedPlayer && (
            <span style={{ fontSize:10, padding:"3px 10px", borderRadius:20, letterSpacing:1,
              background:liveStatus==="live"?"#1a2a1a":liveStatus==="mock"?"#1a1a2a":"#1a1a1a",
              color:liveStatus==="live"?"#22c55e":liveStatus==="mock"?"#555":"#444",
              border:`1px solid ${liveStatus==="live"?"#22c55e30":"#2a2d3a"}` }}>
              {liveStatus==="live"
                ? `● LIVE · ${new Date(lastUpdated).toLocaleDateString()}`

            </span>
          )}
        </div>
        {!selectedPlayer && (
          <div style={{ display:"flex", gap:8, flexWrap:"wrap" }}>
            {SPORTS.map(s=>(
              <button key={s} onClick={()=>setSportFilter(s)}
                style={{ display:"inline-flex", alignItems:"center", padding:"5px 12px", borderRadius:20, border:`1px solid ${sportFilter===s?(SPORT_COLORS[s]||"#f97316"):"#2a2d3a"}`, fontSize:12, cursor:"pointer", fontFamily:"inherit", background:sportFilter===s?`${SPORT_COLORS[s]||"#f97316"}18`:"none", color:sportFilter===s?(SPORT_COLORS[s]||"#f97316"):"#555" }}>
                {s}

      </div>

        <div style={S.tabBar}>
          {[["hot","🔥 Hot Market"],["search","🔍 Search"],["analysis","📊 Trends & Pop"],["psacomps","🏷 PSA Comps"],["import","⬆ Import"]].map(([id,label])=>tabBtn(id,label))}
        </div>
      )}

      {selectedPlayer ? (

          {activeTab==="search"   && <SearchTab/>}
          {activeTab==="analysis" && <TrendsPopTab sportFilter={sportFilter}/>}
          {activeTab==="psacomps" && <PSACompsTab backendUrl={BACKEND_URL}/>}
          {activeTab==="import"   && (

              <h2 style={{ fontFamily:"serif", fontWeight:900, fontSize:22, letterSpacing:2, marginBottom:6 }}>IMPORT YOUR DATA</h2>

              <div style={{ display:"flex", flexDirection:"column", gap:16 }}>

                  <p style={{ fontSize:13, color:"#e2e4ef", marginBottom:4 }}>📁 CSV Upload</p>
                  <p style={{ fontSize:12, color:"#555", marginBottom:14 }}>Upload a spreadsheet exported from eBay, PWCC, or your tracking sheet.</p>
                  <label style={{ border:"2px dashed #2a2d3a", borderRadius:10, padding:30, textAlign:"center", cursor:"pointer", display:"block" }}>
                    <input type="file" accept=".csv" style={{ display:"none" }} onChange={e=>{const f=e.target.files[0];if(f)setUploadMsg(`✓ "${f.name}" ready`);}}/>
                    <p style={{ color:"#555", fontSize:13 }}>Drop CSV here or click to browse</p>

                  <div key={name} style={{ ...S.statBox, display:"flex", justifyContent:"space-between", alignItems:"center", gap:12 }}>

                  <p style={{ fontSize:11, color:"#555", letterSpacing:1, marginBottom:8 }}>CSV FORMAT</p>
                  <pre style={{ fontFamily:"monospace", fontSize:11, color:"#8b8fa8", lineHeight:1.7 }}>{`player,sport,year,set,grade,sale_price,sale_date\nLeBron James,Basketball,2003,Topps Chrome RC,PSA 10,8400,2025-01-15`}</pre>
                </div>
              </div>
            </div>
          )}
        </div>
      )}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<TheCardZoo />);
